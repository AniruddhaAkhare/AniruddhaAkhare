<svg width="1000" height="260" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="1000" height="260" fill="#0D1117" />
  
  <!-- Nebula / Gradient Blobs -->
  <circle cx="200" cy="130" r="100" fill="#0EA5E9" opacity="0.08" filter="url(#glowStrong)">
    <animate attributeName="r" values="80;150;80" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="130" r="100" fill="#3B82F6" opacity="0.08" filter="url(#glowStrong)">
    <animate attributeName="r" values="150;80;150" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Constellations (Connecting lines) -->
  <g stroke="#0EA5E9" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="8s" repeatCount="indefinite" />
    <line x1="150" y1="120" x2="300" y2="180" />
    <line x1="300" y1="180" x2="500" y2="80" />
    <line x1="500" y1="80" x2="700" y2="150" />
    <line x1="700" y1="150" x2="800" y2="210" />
  </g>
  
  <g stroke="#38BDF8" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="10s" repeatCount="indefinite" />
    <line x1="100" y1="50" x2="500" y2="80" />
    <line x1="500" y1="80" x2="900" y2="40" />
    <line x1="400" y1="230" x2="300" y2="180" />
    <line x1="400" y1="230" x2="700" y2="150" />
  </g>

  <!-- Floating Particles & Stars -->
  <g fill="#38BDF8" opacity="0.7" filter="url(#glow)">
    <circle cx="100" cy="50" r="1.5"><animate attributeName="cx" values="100;1000;-10" dur="20s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="180" r="1"><animate attributeName="cx" values="300;1000;-10" dur="15s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="80" r="2.5"><animate attributeName="cx" values="500;1000;-10" dur="25s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="210" r="1.5"><animate attributeName="cx" values="800;1000;-10" dur="18s" repeatCount="indefinite"/></circle>
    
    <circle cx="900" cy="40" r="1.5"><animate attributeName="cx" values="900;-10;1000" dur="22s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="150" r="1"><animate attributeName="cx" values="700;-10;1000" dur="17s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="230" r="2"><animate attributeName="cx" values="400;-10;1000" dur="28s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="120" r="2"><animate attributeName="cx" values="150;-10;1000" dur="19s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Pulsing Nodes on Constellations -->
  <g fill="#0EA5E9" filter="url(#glowStrong)">
    <circle cx="300" cy="180" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="80" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="150" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Central Text Overlay -->
  <text x="500" y="125" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#glowStrong)">
    ANIRUDDHA AKHARE
  </text>
  <text x="500" y="165" font-family="'Courier New', Courier, monospace" font-size="18" letter-spacing="4" fill="#38BDF8" text-anchor="middle">
    AGENTIC AI DEVELOPER | ML ENGINEER
  </text>

  <!-- Sci-Fi Corner Text -->
  <text x="50" y="40" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" opacity="0.6">GALAXY.NODE.01</text>
  <text x="950" y="235" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" opacity="0.6" text-anchor="end">INTELLIGENCE SPREADING...</text>

</svg>
