<svg width="1000" height="130" viewBox="0 0 1000 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1000" height="130" fill="#0D1117" />

  <!-- Neural Wave / Lines -->
  <path d="M 100,65 L 900,65" stroke="#1E3A8A" stroke-width="2" />
  
  <g filter="url(#glow)">
    <path d="M 100,65 L 900,65" stroke="#0EA5E9" stroke-width="1" stroke-dasharray="10 5" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Pulsing Dots -->
  <g fill="#38BDF8" filter="url(#glow)">
    <!-- Node 1 -->
    <circle cx="200" cy="65" r="4">
      <animate attributeName="r" values="4;8;4" dur="2s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="65" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0">
      <animate attributeName="r" values="4;20" dur="2s" begin="0s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2s" begin="0s" repeatCount="indefinite" />
    </circle>
    
    <!-- Node 2 -->
    <circle cx="400" cy="65" r="4">
      <animate attributeName="r" values="4;8;4" dur="2s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="400" cy="65" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0">
      <animate attributeName="r" values="4;20" dur="2s" begin="0.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Node 3 (Center) -->
    <circle cx="500" cy="65" r="6" fill="#0EA5E9">
      <animate attributeName="r" values="6;10;6" dur="2s" begin="1s" repeatCount="indefinite" />
    </circle>
    
    <!-- Node 4 -->
    <circle cx="600" cy="65" r="4">
      <animate attributeName="r" values="4;8;4" dur="2s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="600" cy="65" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0">
      <animate attributeName="r" values="4;20" dur="2s" begin="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2s" begin="1.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Node 5 -->
    <circle cx="800" cy="65" r="4">
      <animate attributeName="r" values="4;8;4" dur="2s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="800" cy="65" r="12" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0">
      <animate attributeName="r" values="4;20" dur="2s" begin="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="2s" begin="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Labels -->
  <text x="200" y="45" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" text-anchor="middle" opacity="0.7">DATA</text>
  <text x="400" y="45" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" text-anchor="middle" opacity="0.7">TRAIN</text>
  <text x="500" y="45" font-family="'Courier New', Courier, monospace" font-size="12" fill="#38BDF8" text-anchor="middle" font-weight="bold">AI CORE</text>
  <text x="600" y="45" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" text-anchor="middle" opacity="0.7">INFER</text>
  <text x="800" y="45" font-family="'Courier New', Courier, monospace" font-size="10" fill="#0EA5E9" text-anchor="middle" opacity="0.7">DEPLOY</text>
  
  <text x="500" y="100" font-family="'Courier New', Courier, monospace" font-size="14" fill="#38BDF8" text-anchor="middle" letter-spacing="2">
    NEURAL NETWORK ACTIVE
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" />
  </text>
</svg>
